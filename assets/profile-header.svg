<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">KasperZF - concepteur et développeur d'application</title>
  <desc id="desc">Terminal animé et coloré avec profil de Kasper, plus de cinq ans d'expérience, activité GitHub, mini snake de contributions et stack technique.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="46%" stop-color="#101820"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="34%" stop-color="#38bdf8"/>
      <stop offset="68%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#2a3340" stroke-width="1" opacity=".45"/>
    </pattern>
    <pattern id="snakeCells" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect x="2" y="2" width="12" height="12" rx="2" fill="#151b23" stroke="#283341" stroke-width="1" opacity=".95"/>
    </pattern>
    <clipPath id="typeReveal">
      <rect x="0" y="0" width="0" height="28">
        <animate attributeName="width" values="0;0;245;245;0" keyTimes="0;.12;.42;.86;1" dur="6.4s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect x="8" y="8" width="1184" height="404" rx="24" fill="url(#bg)"/>
