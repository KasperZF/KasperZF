<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">KasperZF - concepteur et développeur d'applications depuis 2022</title>
  <desc id="desc">Bannière pixel art avec terminal, mini snake façon jeu classique et tags Windows, Linux, Apps, UI et Code.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="46%" stop-color="#101820"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#2a3340" stroke-width="1" opacity=".45"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="26" fill="url(#bg)"/>
  <rect x="18" y="18" width="1164" height="324" rx="18" fill="url(#grid)" opacity=".9"/>
  <rect x="18" y="18" width="1164" height="324" rx="18" fill="none" stroke="#30363d" stroke-width="2"/>

  <g opacity=".55">
    <rect x="63" y="62" width="10" height="10" fill="#22c55e">
      <animate attributeName="opacity" values=".2;1;.2" dur="3.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="95" y="62" width="10" height="10" fill="#f97316">
      <animate attributeName="opacity" values=".9;.2;.9" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="127" y="62" width="10" height="10" fill="#38bdf8">
      <animate attributeName="opacity" values=".25;1;.25" dur="3.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="1102" y="265" width="10" height="10" fill="#facc15">
      <animate attributeName="opacity" values=".3;1;.3" dur="3.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="1068" y="265" width="10" height="10" fill="#22c55e">
      <animate attributeName="opacity" values="1;.25;1" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="1036" y="265" width="10" height="10" fill="#38bdf8">
      <animate attributeName="opacity" values=".35;1;.35" dur="4.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g filter="url(#softGlow)">
    <path d="M78 104 H142 V136 H94 V168 H158 V216 H78 V104" fill="none" stroke="#1f6feb" stroke-width="2" opacity=".18"/>
    <g>
      <rect x="136" y="130" width="12" height="12" rx="3" fill="#f97316"/>
      <rect x="139" y="126" width="5" height="5" rx="1" fill="#22c55e"/>
      <animate attributeName="opacity" values="1;1;0;0;1;1" keyTimes="0;.18;.21;.38;.42;1" dur="5.8s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="152" y="210" width="12" height="12" rx="3" fill="#f97316"/>
      <rect x="155" y="206" width="5" height="5" rx="1" fill="#22c55e"/>
      <animate attributeName="opacity" values="1;1;0;0;1;1" keyTimes="0;.58;.61;.78;.82;1" dur="5.8s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="72" y="98" width="12" height="12" rx="3" fill="#f97316"/>
      <rect x="75" y="94" width="5" height="5" rx="1" fill="#22c55e"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.08;.94;1" dur="5.8s" repeatCount="indefinite"/>
    </g>

    <g opacity=".55">
      <rect x="-7" y="-7" width="14" height="14" rx="3" fill="#14532d">
        <animateMotion dur="5.8s" repeatCount="indefinite" begin="-5.34s" path="M78 104 H142 V136 H94 V168 H158 V216 H78 V104"/>
      </rect>
      <rect x="-7" y="-7" width="14" height="14" rx="3" fill="#15803d">
        <animateMotion dur="5.8s" repeatCount="indefinite" begin="-5.50s" path="M78 104 H142 V136 H94 V168 H158 V216 H78 V104"/>
      </rect>
      <rect x="-7" y="-7" width="14" height="14" rx="3" fill="#16a34a">
        <animateMotion dur="5.8s" repeatCount="indefinite" begin="-5.66s" path="M78 104 H142 V136 H94 V168 H158 V216 H78 V104"/>
      </rect>
    </g>
    <g>
      <rect x="-8" y="-8" width="16" height="16" rx="4" fill="#22c55e">
        <animateMotion dur="5.8s" repeatCount="indefinite" path="M78 104 H142 V136 H94 V168 H158 V216 H78 V104"/>
      </rect>
      <rect x="-4" y="-4" width="3" height="3" fill="#0d1117">
        <animateMotion dur="5.8s" repeatCount="indefinite" path="M78 104 H142 V136 H94 V168 H158 V216 H78 V104"/>
      </rect>
      <rect x="2" y="-4" width="3" height="3" fill="#0d1117">
        <animateMotion dur="5.8s" repeatCount="indefinite" path="M78 104 H142 V136 H94 V168 H158 V216 H78 V104"/>
      </rect>
    </g>
