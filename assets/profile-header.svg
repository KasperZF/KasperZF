  <g transform="translate(190 78)">
    <rect width="820" height="206" rx="14" fill="#0d1117" opacity=".88" stroke="#30363d"/>
    <rect width="820" height="38" rx="14" fill="#161b22"/>
    <circle cx="26" cy="19" r="6" fill="#ff5f56"/>
    <circle cx="48" cy="19" r="6" fill="#ffbd2e"/>
    <circle cx="70" cy="19" r="6" fill="#27c93f"/>
    <text x="96" y="25" fill="#8b949e" font-family="Consolas, 'Courier New', monospace" font-size="14">profile/readme.md</text>

    <text x="42" y="122" fill="#f0f6fc" font-family="Consolas, 'Courier New', monospace" font-size="50" font-weight="700">KasperZF</text>
    <text x="42" y="162" fill="#c9d1d9" font-family="Consolas, 'Courier New', monospace" font-size="22">Concepteur &amp; développeur d'applications</text>
    <text x="42" y="195" fill="#f97316" font-family="Consolas, 'Courier New', monospace" font-size="22">depuis 2022</text>

    <rect x="565" y="72" width="98" height="28" rx="6" fill="#12251b" stroke="#238636"/>
    <text x="584" y="91" fill="#7ee787" font-family="Consolas, 'Courier New', monospace" font-size="14">Windows</text>
    <rect x="674" y="72" width="74" height="28" rx="6" fill="#2b220c" stroke="#d29922"/>
    <text x="695" y="91" fill="#facc15" font-family="Consolas, 'Courier New', monospace" font-size="14">Linux</text>
    <rect x="565" y="112" width="62" height="28" rx="6" fill="#102033" stroke="#1f6feb"/>
    <text x="583" y="131" fill="#79c0ff" font-family="Consolas, 'Courier New', monospace" font-size="14">Apps</text>
    <rect x="638" y="112" width="46" height="28" rx="6" fill="#2a1321" stroke="#db61a2"/>
