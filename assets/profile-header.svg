  <rect x="8" y="53" width="1184" height="2" fill="url(#accentLine)" opacity=".85">
    <animate attributeName="opacity" values=".55;1;.55" dur="4.8s" repeatCount="indefinite"/>
  </rect>
  <g transform="translate(1060 31)">
