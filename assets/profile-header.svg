<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">KasperZF - concepteur et développeur d'applications depuis 2022</title>
  <desc id="desc">Fenêtre macOS plein cadre avec terminal, commandes profil, mini snake qui ramasse des carrés verts façon contributions GitHub et tags Windows, Linux, Front-End et Back-End.</desc>
  <defs>
