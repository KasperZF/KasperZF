<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">KasperZF - concepteur et développeur d'applications depuis 2022</title>
  <desc id="desc">Bannière pixel art avec terminal, mini snake animé et tags Windows, Linux, Apps, UI et Code.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="46%" stop-color="#101820"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22c55e" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#2a3340" stroke-width="1" opacity=".45"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="26" fill="url(#bg)"/>
  <rect x="18" y="18" width="1164" height="324" rx="18" fill="url(#grid)" opacity=".9"/>
  <rect x="18" y="18" width="1164" height="324" rx="18" fill="none" stroke="#30363d" stroke-width="2"/>

  <g opacity=".55">
    <rect x="63" y="62" width="10" height="10" fill="#22c55e">
      <animate attributeName="opacity" values=".2;1;.2" dur="3.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="95" y="62" width="10" height="10" fill="#f97316">
      <animate attributeName="opacity" values=".9;.2;.9" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="127" y="62" width="10" height="10" fill="#38bdf8">
      <animate attributeName="opacity" values=".25;1;.25" dur="3.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="1102" y="265" width="10" height="10" fill="#facc15">
      <animate attributeName="opacity" values=".3;1;.3" dur="3.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="1068" y="265" width="10" height="10" fill="#22c55e">
      <animate attributeName="opacity" values="1;.25;1" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="1036" y="265" width="10" height="10" fill="#38bdf8">
      <animate attributeName="opacity" values=".35;1;.35" dur="4.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g filter="url(#softGlow)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0 116 142;360 116 142" dur="3.6s" repeatCount="indefinite"/>
      <rect x="108" y="82" width="18" height="18" rx="4" fill="#22c55e"/>
      <rect x="133" y="91" width="17" height="17" rx="4" fill="#22c55e" opacity=".9"/>
      <rect x="151" y="112" width="16" height="16" rx="4" fill="#22c55e" opacity=".82"/>
      <rect x="154" y="139" width="15" height="15" rx="4" fill="#38bdf8" opacity=".85"/>
      <rect x="140" y="163" width="15" height="15" rx="4" fill="#38bdf8" opacity=".75"/>
      <rect x="114" y="174" width="14" height="14" rx="4" fill="#facc15" opacity=".82"/>
      <rect x="87" y="166" width="14" height="14" rx="4" fill="#f97316" opacity=".78"/>
      <rect x="69" y="145" width="14" height="14" rx="4" fill="#f97316" opacity=".7"/>
      <rect x="68" y="118" width="15" height="15" rx="4" fill="#22c55e" opacity=".78"/>
      <rect x="85" y="95" width="16" height="16" rx="4" fill="#22c55e" opacity=".9"/>
      <rect x="113" y="87" width="4" height="4" fill="#0d1117"/>
      <rect x="121" y="87" width="4" height="4" fill="#0d1117"/>
    </g>
  </g>

  <g transform="translate(190 78)">
    <rect width="820" height="206" rx="14" fill="#0d1117" opacity=".88" stroke="#30363d"/>
    <rect width="820" height="38" rx="14" fill="#161b22"/>
    <circle cx="26" cy="19" r="6" fill="#ff5f56"/>
    <circle cx="48" cy="19" r="6" fill="#ffbd2e"/>
    <circle cx="70" cy="19" r="6" fill="#27c93f"/>
    <text x="96" y="25" fill="#8b949e" font-family="Consolas, 'Courier New', monospace" font-size="14">profile/readme.md</text>

    <text x="42" y="122" fill="#f0f6fc" font-family="Consolas, 'Courier New', monospace" font-size="50" font-weight="700">KasperZF</text>
    <text x="42" y="162" fill="#c9d1d9" font-family="Consolas, 'Courier New', monospace" font-size="22">Concepteur &amp; développeur d'applications</text>
    <text x="42" y="195" fill="#f97316" font-family="Consolas, 'Courier New', monospace" font-size="22">depuis 2022</text>

    <rect x="565" y="72" width="98" height="28" rx="6" fill="#12251b" stroke="#238636"/>
    <text x="584" y="91" fill="#7ee787" font-family="Consolas, 'Courier New', monospace" font-size="14">Windows</text>
    <rect x="674" y="72" width="74" height="28" rx="6" fill="#2b220c" stroke="#d29922"/>
    <text x="695" y="91" fill="#facc15" font-family="Consolas, 'Courier New', monospace" font-size="14">Linux</text>
    <rect x="565" y="112" width="62" height="28" rx="6" fill="#102033" stroke="#1f6feb"/>
    <text x="583" y="131" fill="#79c0ff" font-family="Consolas, 'Courier New', monospace" font-size="14">Apps</text>
    <rect x="638" y="112" width="46" height="28" rx="6" fill="#2a1321" stroke="#db61a2"/>
    <text x="653" y="131" fill="#ff9ad5" font-family="Consolas, 'Courier New', monospace" font-size="14">UI</text>
    <rect x="695" y="112" width="102" height="28" rx="6" fill="#271c10" stroke="#f97316"/>
    <text x="726" y="131" fill="#fdba74" font-family="Consolas, 'Courier New', monospace" font-size="14">Code</text>
  </g>

  <rect x="-210" y="0" width="210" height="360" fill="url(#scan)">
    <animate attributeName="x" values="-210;1200" dur="7.5s" repeatCount="indefinite"/>
  </rect>

</svg>
