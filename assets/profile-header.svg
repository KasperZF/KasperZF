        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#2a3340" stroke-width="1" opacity=".45"/>
    </pattern>
    <pattern id="snakeCells" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect x="2" y="2" width="12" height="12" rx="2" fill="#151b23" stroke="#283341" stroke-width="1" opacity=".95"/>
    </pattern>
  </defs>

  <rect x="8" y="8" width="1184" height="344" rx="24" fill="url(#bg)"/>
