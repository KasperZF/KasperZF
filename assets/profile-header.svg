      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="46%" stop-color="#101820"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
